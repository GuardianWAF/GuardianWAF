name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detection Engine
        - Rate Limiting
        - Bot Detection
        - Dashboard
        - MCP Server
        - CLI
        - Configuration
        - Reverse Proxy
        - Library API
        - Documentation
        - Other
