name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent runs on same ref, cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All third-party actions are pinned to commit SHA to prevent supply chain attacks
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: internal/dashboard/ui/package-lock.json

      - name: Install & Build
        working-directory: internal/dashboard/ui
        run: npm ci --no-audit --no-fund && npm run build

      - name: Test
        working-directory: internal/dashboard/ui
        run: npm test

      - name: Audit
        working-directory: internal/dashboard/ui
        run: npm audit --audit-level=high

      - name: Lint
        working-directory: internal/dashboard/ui
        run: npm run lint

      - name: Upload dashboard assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-dist
          path: internal/dashboard/ui/dist/
          retention-days: 1

  test:
    needs: [build-dashboard]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.0', '1.24']
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dashboard assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          # Exclude packages without test files to avoid covdata tool issues on Go 1.24
          go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/examples/' | grep -v '/internal/ml/onnx' | grep -v '/internal/ml/features' | grep -v '/scripts/attack-simulation')

      - name: Upload coverage
        if: matrix.go-version == '1.25.0'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    needs: [build-dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Download dashboard assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11

  benchmark:
    needs: [build-dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Download dashboard assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -run=^$ -count=3 ./... 2>&1 | tee benchmark-new.txt

      - name: Compare with base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git stash
          git checkout "origin/${BASE_REF}"
          go test -bench=. -benchmem -run=^$ -count=3 ./... 2>&1 | tee benchmark-base.txt || true
          git checkout -
          git stash pop || true
          if [ -f benchmark-base.txt ] && [ -s benchmark-base.txt ]; then
            go install golang.org/x/perf/cmd/benchstat@latest
            benchstat benchmark-base.txt benchmark-new.txt > benchstat-output.txt 2>&1 || true
            cat benchstat-output.txt
            # Fail if any benchmark shows >20% regression (geomean or individual)
            if grep -qE '~\s*[1-9][0-9]*%' benchstat-output.txt; then
              echo "::error::Benchmark regression detected (>=10% slowdown)"
              exit 1
            fi
          fi


  # Security scanning jobs
  govulncheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
    - name: Run govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
    - name: Run gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec -no-fail ./...

  trufflehog:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: Scan for secrets
      run: |
        go install github.com/trufflesecurity/trufflehog@latest
        trufflehog filesystem --no-update --fail .
      env:
        SKIP_TRUFFLEHOG_UPDATE_CHECK: true

  trivy-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Run Trivy vulnerability scanner on base image
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy:latest image \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          --no-progress \
          golang:1.25-alpine
    - name: Scan Dockerfile for misconfigs
      run: |
        docker run --rm -v $(pwd):/workspace aquasec/trivy:latest config /workspace --exit-code 1

  lighthouse:
    needs: [build-dashboard]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: internal/dashboard/ui/package-lock.json
    - name: Build dashboard
      run: cd internal/dashboard/ui && npm ci && npm run build
    - name: Build Go binary
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
    - run: go build -o guardianwaf ./cmd/guardianwaf/
    - name: Start WAF server
      run: |
        ./guardianwaf serve &
        sleep 5
        curl -sf http://localhost:9443/api/v1/health || (echo "Server not ready" && exit 1)
    - name: Run Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.14.x
        lhci autorun --config=lighthouserc.json || true
      env:
        LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
